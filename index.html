<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .board {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      gap: 20px;
    }

    .column {
      background: #e0e4e8;
      border-radius: 10px;
      width: 30%;
      padding: 10px;
      min-height: 400px;
    }

    .column h2 {
      text-align: center;
    }

    .task {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      cursor: grab;
    }

    .add-task {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 8px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Kanban Board</h1>
</header>

<div class="add-task">
  <input type="text" id="taskInput" placeholder="Enter new task">
  <button onclick="addTask()">Add</button>
</div>

<div class="board">

  <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h2>To Do</h2>
  </div>

  <div class="column" id="inprogress" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h2>In Progress</h2>
  </div>

  <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h2>Done</h2>
  </div>

</div>

<script>
  let taskId = 0;

  function addTask() {
    const input = document.getElementById("taskInput");
    const value = input.value.trim();

    if (value === "") return;

    const task = document.createElement("div");
    task.className = "task";
    task.draggable = true;
    task.id = "task-" + taskId++;
    task.innerText = value;

    task.ondragstart = drag;

    document.getElementById("todo").appendChild(task);
    input.value = "";
  }

  function allowDrop(ev) {
    ev.preventDefault();
  }

  function drag(ev) {
    ev.dataTransfer.setData("text", ev.target.id);
  }

  function drop(ev) {
    ev.preventDefault();
    const data = ev.dataTransfer.getData("text");
    const task = document.getElementById(data);
    ev.target.appendChild(task);
  }
</script>

</body>
</html>
